
<!DOCTYPE html>
<html>
<head>
<title>Services</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2>Our Services</h2>

<table class="table table-bordered">

<tr>
<th>Service</th>
<th>Price</th>
</tr>

{% for s in services %}
<tr>
<td>{{s.service}}</td>
<td>₹{{s.price}}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
